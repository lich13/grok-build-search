name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            asset: grok-build-search-mcp-darwin-aarch64
          - os: macos-14
            target: x86_64-apple-darwin
            asset: grok-build-search-mcp-darwin-x86_64
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            asset: grok-build-search-mcp-linux-aarch64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset: grok-build-search-mcp-linux-x86_64
    env:
      TARGET: ${{ matrix.target }}
      ASSET: ${{ matrix.asset }}
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          package_version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)
          test "$GITHUB_REF_NAME" = "v${package_version}"

      - name: Install pinned Rust toolchain and target
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.94.1 --profile minimal
          rustup target add "$TARGET" --toolchain 1.94.1

      - name: Install Linux cross compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-aarch64-linux-gnu

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$TARGET" == "aarch64-unknown-linux-gnu" ]]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --locked --target "$TARGET"
          mkdir -p dist
          install -m 0755 "target/${TARGET}/release/grok-build-search-mcp" "dist/${ASSET}"

      - name: Upload release binary
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download release binaries
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Verify assets and generate checksums
        shell: bash
        run: |
          set -euo pipefail
          assets=(
            grok-build-search-mcp-darwin-aarch64
            grok-build-search-mcp-darwin-x86_64
            grok-build-search-mcp-linux-aarch64
            grok-build-search-mcp-linux-x86_64
          )
          for asset in "${assets[@]}"; do
            test -f "dist/${asset}"
          done
          test "$(find dist -maxdepth 1 -type f | wc -l | tr -d ' ')" = "4"
          (
            cd dist
            sha256sum "${assets[@]}" > SHA256SUMS
            sha256sum --check SHA256SUMS
          )

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            dist/grok-build-search-mcp-darwin-aarch64 \
            dist/grok-build-search-mcp-darwin-x86_64 \
            dist/grok-build-search-mcp-linux-aarch64 \
            dist/grok-build-search-mcp-linux-x86_64 \
            dist/SHA256SUMS \
            --verify-tag \
            --title "grok-build-search ${GITHUB_REF_NAME}" \
            --generate-notes
